<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Estilos css -->
    <link rel="stylesheet" href="styles/style-home.css">
    <link rel="stylesheet" href="styles/style-navigation.css">
    <!-- Font awesome -->
    <link rel="stylesheet" href="recursos/font-awesome/css/all.min.css">
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Open+Sans:wght@300&family=Roboto:wght@500&display=swap" rel="stylesheet">

    <title>Portafolio</title>
</head>

<body>

    <!-- Area de navegacion -->
    <div class="navigation">
        <div class="banner">
            <!-- <img src="img/banner.jpg" alt="banner.jpg" class="cover"> -->
            <video class="cover" autoplay>
                <source src="video/darina-belonogova.mp4" type="video/mp4">
            </video>
        </div>
        <div class="navLink">
            <div class="mode">
                <img src="img/moon.png" alt="moon/sun" id="icon">
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Portafolio</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

        </div>
    </div>

    <!-- Fin del area de navegacion -->

    <!-- Home -->
    <div class="home">
        <nav>
            <!-- <img src="img/trueno.svg" alt="logo.png" class="logo" id="logo"> -->
            <!-- <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#portafolio">Portafolio</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#contactame">Contactame</a></li>
            </ul> -->
            <div class="toggle"></div>
        </nav>

        <div class="info">
            <h1><span> Luiggi </span> Yantas</h1>
            <p class="info-corta">Lorem ipsum dolor sit amet consectetur adipisicing elit. Nobis ex veniam esse, quae et <br> accusamus recusandae quia quo optio facilis, tenetur excepturi placeat ipsa quidem <br> nostrum veritatis ipsam vitae deserunt!</p>
            <a href="">Descargar cv</a>
        </div>

        <div class="img-box">
            <img src="img/blob1.svg" alt="blob1.svg" class="back-img" id="blob">
            <img src="img/coffee.png" alt="coffee.png" class="main-img">
        </div>

        <div class="social-links">
            <a href=""><i class="fab fa-linkedin-in"></i></a>
            <a href=""><i class="fab fa-facebook-f"></i></a>
            <a href=""><i class="fab fa-instagram"></i></a>
            <a href=""><i class="fab fa-github"></i></a>
        </div>
    </div>
    <!-- Fin home -->

    <!-- Contactame -->
    <div class="contact-me">

    </div>
    <!-- Fin contactame -->

    <script>
        var icon = document.getElementById("icon");
        var blob = document.getElementById("blob");

        var menu = document.querySelector('.toggle');
        var navigation = document.querySelector('.navigation');
        var home = document.querySelector('.home');
        var video = document.querySelector('.cover');
        // var logo = document.getElementById("logo");
        icon.onclick = function() {
            document.body.classList.toggle("dark-mode");
            if (document.body.classList.contains("dark-mode")) {
                blob.src = "img/blob2.svg";
                icon.src = "img/sun.png";
                // logo.src = "img/trueno2.svg";
            } else {
                blob.src = "img/blob1.svg";
                icon.src = "img/moon.png";
                // logo.src = "img/trueno.svg";
            }
        }

        menu.onclick = function() {
            // Reiniciar video. 
            if (!navigation.classList.contains('active')) {
                video.pause();
                video.currentTime = 0;
                video.load();
            }
            menu.classList.toggle('active');
            navigation.classList.toggle('active');
            home.classList.toggle('active');
        }
    </script>
</body>

</html>
